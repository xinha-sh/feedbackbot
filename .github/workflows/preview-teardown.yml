name: Preview teardown

on:
  pull_request:
    types: [closed]

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      # Same shared secrets so alchemy.run.ts can typecheck/import
      # without erroring during the destroy graph build.
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      INTEGRATIONS_ENCRYPTION_KEY: ${{ secrets.INTEGRATIONS_ENCRYPTION_KEY }}
      HMAC_SECRET_SEED: ${{ secrets.HMAC_SECRET_SEED }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Destroy preview
        # Tolerate the stage being already gone (idempotent).
        run: |
          pnpm exec alchemy destroy --stage "$STAGE" --yes || \
            echo "destroy returned non-zero — stage may already be torn down"
