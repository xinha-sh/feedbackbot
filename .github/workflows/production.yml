name: Production deploy

on:
  push:
    branches: [main]
  # Manual re-deploy. Use this after rotating a secret (where
  # `gh run rerun <id>` would also work but only against the
  # last completed run). `gh workflow run "Production deploy"
  # --ref main` against the current main HEAD.
  workflow_dispatch:

# Only one production deploy at a time.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      INTEGRATIONS_ENCRYPTION_KEY: ${{ secrets.INTEGRATIONS_ENCRYPTION_KEY }}
      HMAC_SECRET_SEED: ${{ secrets.HMAC_SECRET_SEED }}
      # Google OAuth callback URL is registered against the apex;
      # only this stage has the secrets. Previews zero them in
      # alchemy.run.ts.
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      # Live-mode billing — only on production.
      DODO_PAYMENTS_API_KEY: ${{ secrets.DODO_PAYMENTS_API_KEY }}
      DODO_PAYMENTS_WEBHOOK_SECRET: ${{ secrets.DODO_PAYMENTS_WEBHOOK_SECRET }}
      DODO_PAYMENTS_ENV: live_mode
      # Email + the rest.
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
      SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
      # Cloudflare Turnstile — anti-spam gate on /api/ticket plus
      # auto-add of customer hostnames on DNS verification. Both
      # default OFF in graceful mode, so unset is fine. The site
      # key (CF_TURNSTILE_WIDGET_ID) is public — stored as a
      # secret here only because that's how it was set up;
      # functionally fine since it ends up baked into widget.js.
      TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
      CF_TURNSTILE_WIDGET_ID: ${{ secrets.CF_TURNSTILE_WIDGET_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate paraglide messages
        # tsc on a clean checkout fails because src/paraglide/* is
        # generated (gitignored). The vite build during deploy creates
        # them automatically, but typecheck runs first.
        run: pnpm exec paraglide-js compile

      - name: Typecheck + tests
        run: |
          pnpm exec tsc --noEmit
          pnpm test

      # Build the widget bundle from source. Reads
      # CF_TURNSTILE_WIDGET_ID from the env block above and bakes
      # it into public/widget.js so the deployed bundle and the
      # server gate are always config-coherent. (Was committed-
      # to-repo previously, which let the bundle drift out of
      # sync with the server's env vars and broke prod.)
      - name: Build widget bundle
        run: pnpm build:widget

      - name: Deploy production
        run: pnpm exec alchemy deploy --stage production
