name: Production deploy

on:
  push:
    branches: [main]

# Only one production deploy at a time.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      INTEGRATIONS_ENCRYPTION_KEY: ${{ secrets.INTEGRATIONS_ENCRYPTION_KEY }}
      HMAC_SECRET_SEED: ${{ secrets.HMAC_SECRET_SEED }}
      # Production-only credentials. GitHub OAuth's callback URL is
      # registered against the apex; only this stage has them.
      GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      # Live-mode billing — only on production.
      DODO_PAYMENTS_API_KEY: ${{ secrets.DODO_PAYMENTS_API_KEY }}
      DODO_PAYMENTS_WEBHOOK_SECRET: ${{ secrets.DODO_PAYMENTS_WEBHOOK_SECRET }}
      DODO_PAYMENTS_ENV: live_mode
      # Email + the rest.
      UNOSEND_API_KEY: ${{ secrets.UNOSEND_API_KEY }}
      UNOSEND_FROM: ${{ secrets.UNOSEND_FROM }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
      SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate paraglide messages
        # tsc on a clean checkout fails because src/paraglide/* is
        # generated (gitignored). The vite build during deploy creates
        # them automatically, but typecheck runs first.
        run: pnpm exec paraglide-js compile

      - name: Typecheck + tests
        run: |
          pnpm exec tsc --noEmit
          pnpm test

      - name: Deploy production
        run: pnpm exec alchemy deploy --stage production
