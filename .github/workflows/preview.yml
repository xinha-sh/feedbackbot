name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs of this workflow for the same PR — only the
# latest commit's preview matters.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
      # Cloudflare auth.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Alchemy state encryption + remote state store.
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      # Required app secrets (shared with prod).
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      INTEGRATIONS_ENCRYPTION_KEY: ${{ secrets.INTEGRATIONS_ENCRYPTION_KEY }}
      HMAC_SECRET_SEED: ${{ secrets.HMAC_SECRET_SEED }}
      # Email (so magic-link auth works on previews).
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
      SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
      # Dodo billing skipped on previews:
      #   - The webhook endpoint registered at Dodo points at the
      #     production apex, so preview checkouts wouldn't reconcile.
      #   - The live API key in repo secrets shouldn't ever target
      #     test-mode endpoints.
      # Result: the billing plugin stays unmounted on previews; the
      # /signup flow's start-checkout endpoint returns 503 if hit.
      # Magic-link auth + the rest of the app still work for review.
      #
      # Google OAuth credentials are forwarded to previews too. The
      # OAuth client at Google only registers the production redirect
      # URI, but the better-auth oAuthProxy plugin routes preview
      # callbacks through prod (see src/lib/auth.ts). All stages need
      # the same socialProviders config registered so Better Auth
      # knows the provider exists.
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      # Test-mode Dodo bearer for the integration suite's contract
      # test (src/__tests__/dodo-contract.test.ts). Distinct from
      # DODO_PAYMENTS_API_KEY (which is the LIVE key on prod) so the
      # test suite never touches live billing.
      DODO_TEST_API_KEY: ${{ secrets.DODO_TEST_API_KEY }}
      # Cloudflare Turnstile — anti-spam gate on /api/ticket plus
      # auto-add of customer hostnames on DNS verification. Both
      # default OFF in graceful mode, so unset is fine. Site key
      # (CF_TURNSTILE_WIDGET_ID) is public — stored as a secret
      # here only because that's how it was set up; functionally
      # fine since it ends up baked into widget.js.
      TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
      CF_TURNSTILE_WIDGET_ID: ${{ secrets.CF_TURNSTILE_WIDGET_ID }}
    steps:
      - uses: actions/checkout@v4

      # Reads pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generate paraglide messages first — tsc on a clean checkout
      # fails because src/paraglide/* is gitignored and only created
      # by the vite build. Mirrors what production.yml does.
      - name: Generate paraglide messages
        run: pnpm exec paraglide-js compile

      # Run typecheck + tests before spending the ~2 min on the
      # alchemy deploy. The Dodo contract test runs here (preview is
      # the only CI lane where it executes; production self-skips
      # because DODO_PAYMENTS_ENV=live_mode there).
      - name: Typecheck + tests
        run: |
          pnpm exec tsc --noEmit
          pnpm test

      # Post a sticky "deploying…" comment immediately so the PR shows
      # progress before alchemy finishes (the deploy step itself can
      # take 2–3 min, plus first-time TLS adds ~5–10 min on a fresh PR
      # hostname). The marker is "🔬 **Preview" — both the success and
      # failure steps below match the same prefix and upsert the same
      # comment, so the PR only ever shows one preview-status comment.
      - name: Comment deploy in progress
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              '🔬 **Preview deploying…**',
              '',
              `Building \`pr-${{ github.event.pull_request.number }}\` and rolling it onto Cloudflare. The URL will appear here when ready.`,
              '',
              `→ [Workflow run](${runUrl})`,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const marker = '🔬 **Preview'
            const existing = comments.find((c) => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      # Build the widget bundle from source. Reads
      # CF_TURNSTILE_WIDGET_ID from the env block above and bakes
      # it into public/widget.js so the deployed bundle and the
      # server gate are always config-coherent.
      - name: Build widget bundle
        run: pnpm build:widget

      - name: Deploy preview
        id: deploy
        run: |
          # Don't pipefail-bail on alchemy's exit code — it sometimes
          # returns non-zero from a post-deploy finalize step even when
          # all resources were created. We treat URL-presence as the
          # real success signal.
          pnpm exec alchemy deploy --stage "$STAGE" 2>&1 | tee deploy.log || true
          ALCHEMY_EXIT=${PIPESTATUS[0]}
          echo "alchemy exit: $ALCHEMY_EXIT"
          # Strip ANSI escape codes alchemy uses for colored output,
          # then extract the public URL printed by alchemy.run.ts.
          # Matches both workers.dev (sandbox stages) and the apex /
          # *.preview.usefeedbackbot.com hostnames the prod + pr-N
          # stages now use.
          URL=$(sed -E "s/\x1b\[[0-9;]*m//g" deploy.log \
            | grep -oE "https://[a-zA-Z0-9.-]+\.(workers\.dev|usefeedbackbot\.com)" \
            | tail -n1)
          if [ -z "$URL" ]; then
            echo "::error::Deploy failed (no app URL in output, alchemy exit $ALCHEMY_EXIT)"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::Preview ready at $URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const isPreviewSub = url.endsWith('.preview.usefeedbackbot.com')
            const lines = [
              '🔬 **Preview ready**',
              '',
              url,
              '',
              '> Magic-link sign-in works. GitHub OAuth and Dodo billing are inactive on previews — see DECISIONS.md for the full caveat list.',
            ]
            if (isPreviewSub) {
              lines.push('')
              lines.push(
                '> _First-time TLS cert provisioning on a fresh PR hostname takes ~5–10 min via Google CA. If you see a handshake error, give it a few minutes and refresh._',
              )
            }
            const body = lines.join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            // Match any prior preview-status comment (deploying / ready /
            // failed) so we upsert the same one rather than stacking.
            const marker = '🔬 **Preview'
            const existing = comments.find((c) => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      # If any earlier step failed (typically the deploy itself),
      # rewrite the sticky comment so the PR doesn't sit on a stale
      # "deploying…" forever.
      - name: Comment deploy failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              '🔬 **Preview failed**',
              '',
              `Deploy of \`pr-${{ github.event.pull_request.number }}\` did not finish. Push a new commit to retry.`,
              '',
              `→ [Workflow run](${runUrl})`,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const marker = '🔬 **Preview'
            const existing = comments.find((c) => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
