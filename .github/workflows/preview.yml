name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs of this workflow for the same PR — only the
# latest commit's preview matters.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      STAGE: pr-${{ github.event.pull_request.number }}
      # Cloudflare auth.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Alchemy state encryption + remote state store.
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      # Required app secrets (shared with prod).
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      INTEGRATIONS_ENCRYPTION_KEY: ${{ secrets.INTEGRATIONS_ENCRYPTION_KEY }}
      HMAC_SECRET_SEED: ${{ secrets.HMAC_SECRET_SEED }}
      # Email (so magic-link auth works on previews).
      UNOSEND_API_KEY: ${{ secrets.UNOSEND_API_KEY }}
      UNOSEND_FROM: ${{ secrets.UNOSEND_FROM }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
      SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
      # Dodo billing skipped on previews:
      #   - The webhook endpoint registered at Dodo points at the
      #     production apex, so preview checkouts wouldn't reconcile.
      #   - The live API key in repo secrets shouldn't ever target
      #     test-mode endpoints.
      # Result: the billing plugin stays unmounted on previews; the
      # /signup flow's start-checkout endpoint returns 503 if hit.
      # Magic-link auth + the rest of the app still work for review.
      #
      # NOTE: GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET are intentionally
      # not passed — alchemy.run.ts zeroes them on non-production stages
      # so the social-github provider stays inactive.
    steps:
      - uses: actions/checkout@v4

      # Reads pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify CF token reaches CI intact
        run: |
          echo "TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo "TOKEN prefix: ${CLOUDFLARE_API_TOKEN:0:5}..."
          echo "ACCT ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "ACCT ID first/last char: ${CLOUDFLARE_ACCOUNT_ID:0:1}...${CLOUDFLARE_ACCOUNT_ID: -1}"
          echo "--- token validity ---"
          curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            | python3 -c "import json,sys;d=json.load(sys.stdin);print('valid=',d.get('success'),'status=',d['result'].get('status'))"
          echo "--- target endpoint ---"
          curl -s -o /dev/null -w "settings: HTTP %{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/alchemy-state-service/settings"

      - name: Deploy preview
        id: deploy
        run: |
          # Don't pipefail-bail on alchemy's exit code — it sometimes
          # returns non-zero from a post-deploy finalize step even when
          # all resources were created. We treat URL-presence as the
          # real success signal.
          pnpm exec alchemy deploy --stage "$STAGE" 2>&1 | tee deploy.log || true
          ALCHEMY_EXIT=${PIPESTATUS[0]}
          echo "alchemy exit: $ALCHEMY_EXIT"
          # Strip ANSI escape codes alchemy uses for colored output,
          # then extract the workers.dev URL printed by alchemy.run.ts.
          URL=$(sed -E "s/\x1b\[[0-9;]*m//g" deploy.log \
            | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" \
            | tail -n1)
          if [ -z "$URL" ]; then
            echo "::error::Deploy failed (no app URL in output, alchemy exit $ALCHEMY_EXIT)"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::Preview ready at $URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const body = [
              '🔬 **Preview ready**',
              '',
              url,
              '',
              '> Magic-link sign-in works. GitHub OAuth and Dodo billing are inactive on previews — see DECISIONS.md for the full caveat list.',
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const marker = '🔬 **Preview ready**'
            const existing = comments.find((c) => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
